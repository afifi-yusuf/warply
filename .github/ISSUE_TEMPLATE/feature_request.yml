name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is hard today?
      placeholder: I want to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or workflow you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other designs have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SDK/API
        - Compiler/planning
        - Provider integration
        - Engine adapter
        - KV transfer
        - Router/client
        - Observability
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, related projects, or deployment constraints.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues.
          required: true
        - label: This request does not include secrets or private infrastructure details.
          required: true
